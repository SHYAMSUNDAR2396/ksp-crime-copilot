- id: 29
  question: How many non-heinous cases were registered in Mysuru district?
  sql: >
    SELECT COUNT(CaseMaster.CaseMasterID) AS n FROM CaseMaster
    LEFT JOIN Unit ON CaseMaster.PoliceStationID = Unit.UnitID
